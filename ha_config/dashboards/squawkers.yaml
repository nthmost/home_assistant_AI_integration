# Squawkers McCaw dashboard — sends learned IR commands via the office
# Broadlink emitter (remote.office_lights, device "squawkers").
#
# Pure built-in cards: no HACS dependency.
#
# Deployed at /config/dashboards/squawkers.yaml on the HA host.
# Registered in /config/configuration.yaml under lovelace.dashboards.squawkers-mccaw.

title: Squawkers

views:
  - title: Squawkers
    path: squawkers
    icon: mdi:bird
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # 🦜 Squawkers McCaw

              32 learned IR commands. Each press repeats the signal 3× for
              reliability. Start with **DANCE** / **RESET** if unsure.
      - type: grid
        cards:
          - type: markdown
            content: |
              ### 🦜 Universal

              The most reliable commands — work in any mode.
      - type: grid
        columns: 3
        square: false
        cards:
          - type: button
            name: DANCE
            icon: mdi:dance-ballroom
            tap_action:
              action: call-service
              service: remote.send_command
              target:
                entity_id: remote.office_lights
              data:
                device: squawkers
                command: DANCE
                num_repeats: 3
                delay_secs: 0.5
          - type: button
            name: RESET
            icon: mdi:stop-circle-outline
            tap_action:
              action: call-service
              service: remote.send_command
              target:
                entity_id: remote.office_lights
              data:
                device: squawkers
                command: RESET
                num_repeats: 3
                delay_secs: 0.5
